name: Clean Next 15 migration diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: upgrade-next15
          fetch-depth: 0
      - name: Remove temporary migration files
        shell: bash
        run: |
          rm -f .next15-audit.json
          rm -f .next15-install.log
          rm -f .next15-lint.log
          rm -f .next15-build.log
          rm -f .next15-status.json
          rm -f .next15-pr-trigger*
          rm -f .github/workflows/next15-upgrade.yml
      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "chore: remove temporary Next 15 migration diagnostics"
          git push origin HEAD:upgrade-next15
