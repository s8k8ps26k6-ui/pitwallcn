name: Remove homepage validation diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/immersive-homepage
          fetch-depth: 0
      - name: Remove temporary files
        run: |
          rm -f .homepage-lint.log .homepage-build.log .homepage-status.json
          rm -f .github/workflows/homepage-validate.yml
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "chore: remove temporary homepage validation files"
          git push origin HEAD:feat/immersive-homepage
