name: Repository audit

on:
  push:
    branches:
      - chore/security-openf1-hardening

permissions:
  contents: write

jobs:
  audit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chore/security-openf1-hardening
      - name: Generate source audit report
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('.')
          source_files = sorted(path for path in Path('src').rglob('*') if path.is_file())
          audit_files = source_files + [Path('next.config.mjs'), Path('.env.example')]

          def find_references(needle):
              references = []
              for path in audit_files:
                  if not path.exists():
                      continue
                  for line_number, line in enumerate(path.read_text(encoding='utf-8').splitlines(), 1):
                      if needle in line:
                          references.append({'file': str(path), 'line': line_number})
              return references

          route_directories = sorted({str(path.parent) for path in Path('src/app').rglob('page.tsx')})
          missing_error_boundaries = [
              directory for directory in route_directories
              if not (Path(directory) / 'error.tsx').exists()
          ]

          report = {
              'source_files': [str(path) for path in source_files],
              'openf1_url_references': find_references('api.openf1.org'),
              'openf1_client_references': find_references('fetchOpenF1'),
              'next_public_references': find_references('NEXT_PUBLIC_'),
              'process_env_references': find_references('process.env'),
              'route_directories': route_directories,
              'missing_error_boundaries': missing_error_boundaries,
          }

          Path('.repo-audit-output.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8'
          )
          PY
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Commit audit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .repo-audit-output.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: record temporary repository audit"
          git push
